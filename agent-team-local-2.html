<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Team · On-Premise</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0e0f11;
    --bg2:      #161820;
    --bg3:      #1e2028;
    --bg4:      #252730;
    --border:   #2e303a;
    --border2:  #3a3c48;
    --text:     #e4e6f0;
    --text2:    #9195a8;
    --text3:    #5c5f70;
    --accent:   #7F77DD;
    --green:    #1D9E75;
    --blue:     #378ADD;
    --pink:     #D4537E;
    --amber:    #BA7517;
    --coral:    #D85A30;
    --radius:   8px;
    --radius-lg: 12px;
    font-size: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg2);
  }
  .logo {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #534AB7);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  header h1 { font-size: 15px; font-weight: 600; }
  header p  { font-size: 12px; color: var(--text2); }
  .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .pill {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border2); color: var(--text2); background: var(--bg3);
    cursor: pointer; transition: all .15s;
  }
  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { border-color: var(--green); color: var(--green); background: #1D9E7511; }
  #conn-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0;
  }
  #conn-dot.ok   { background: var(--green); }
  #conn-dot.fail { background: #E24B4A; }

  /* ── Config bar ── */
  #config-bar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 10px 24px;
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
  }
  #config-bar label { font-size: 11px; color: var(--text2); }
  #config-bar input, #config-bar select {
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); border-radius: 6px; padding: 4px 9px;
    font-size: 12px; outline: none;
    transition: border-color .15s;
  }
  #config-bar input:focus, #config-bar select:focus { border-color: var(--accent); }
  #config-bar .sep { width: 1px; height: 20px; background: var(--border); }

  /* ── Main layout ── */
  .layout {
    flex: 1;
    display: grid;
    grid-template-columns: 270px 1fr;
    grid-template-rows: auto 1fr;
    overflow: hidden;
    height: calc(100vh - 112px);
  }

  /* ── Project input ── */
  .project-bar {
    grid-column: 1 / -1;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: center;
    background: var(--bg2);
  }
  .project-bar input {
    flex: 1;
    background: var(--bg3); border: 1px solid var(--border2);
    color: var(--text); border-radius: 8px;
    padding: 9px 14px; font-size: 13px; outline: none;
    transition: border-color .15s;
  }
  .project-bar input:focus { border-color: var(--accent); }
  .project-bar input::placeholder { color: var(--text3); }
  .btn {
    padding: 9px 18px; border-radius: 8px; border: none;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: all .15s; white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent); color: #fff;
  }
  .btn-primary:hover { background: #6b63cc; }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-ghost {
    background: var(--bg3); color: var(--text2);
    border: 1px solid var(--border2);
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

  /* ── Team panel ── */
  #team-panel {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
    background: var(--bg);
  }
  .panel-label {
    font-size: 10px; font-weight: 600; letter-spacing: .1em;
    color: var(--text3); text-transform: uppercase; padding: 2px 0 6px;
  }

  .agent-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    border-left: 3px solid transparent;
    transition: border-color .2s;
  }
  .agent-card-head {
    display: flex; align-items: center; gap: 8px;
  }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 600; flex-shrink: 0;
  }
  .agent-name  { font-size: 13px; font-weight: 500; }
  .agent-role  { font-size: 11px; color: var(--text2); }
  .status-badge {
    margin-left: auto; display: flex; align-items: center; gap: 4px;
    font-size: 10px; color: var(--text3);
  }
  .sdot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text3); flex-shrink: 0;
  }
  .sdot.assigned { background: var(--amber); }
  .sdot.thinking { background: var(--blue); animation: pulse 1s infinite; }
  .sdot.active   { background: var(--green); }
  .sdot.done     { background: var(--green); }

  .task-block {
    margin-top: 8px;
    background: var(--bg3);
    border-radius: 6px; padding: 8px 10px;
    font-size: 11px; display: none;
  }
  .task-block.show { display: block; }
  .task-title {
    font-weight: 500; font-size: 12px; margin-bottom: 3px;
    display: flex; justify-content: space-between; align-items: flex-start; gap: 4px;
  }
  .task-desc  { color: var(--text2); line-height: 1.45; }
  .pri {
    font-size: 9px; padding: 1px 6px; border-radius: 4px;
    flex-shrink: 0; margin-top: 1px;
  }
  .pri.high   { background: #D85A3022; color: #F0997B; }
  .pri.medium { background: #BA751722; color: #FAC775; }
  .pri.low    { background: #1D9E7522; color: #5DCAA5; }

  /* ── Feed ── */
  #feed-panel {
    overflow-y: auto;
    padding: 14px 18px;
    display: flex; flex-direction: column; gap: 0;
    background: var(--bg);
  }
  .feed-empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 10px; color: var(--text3); padding: 60px 20px;
  }
  .feed-empty svg { opacity: .25; }
  .feed-empty p   { font-size: 13px; }

  .msg {
    display: flex; gap: 10px; padding: 10px 0;
    border-bottom: 1px solid var(--border);
    animation: slideIn .2s ease;
  }
  .msg:last-child { border-bottom: none; }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(5px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-avatar {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 600; flex-shrink: 0; margin-top: 1px;
  }
  .msg-body  { flex: 1; min-width: 0; }
  .msg-head  {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 4px; flex-wrap: wrap;
  }
  .msg-from  { font-size: 12px; font-weight: 600; }
  .msg-arrow { font-size: 11px; color: var(--text3); }
  .msg-to    { font-size: 12px; color: var(--text2); }
  .msg-time  { font-size: 10px; color: var(--text3); margin-left: auto; }
  .msg-tag {
    font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 500;
  }
  .tag-kickoff { background: #7F77DD22; color: var(--accent); }
  .tag-update  { background: #1D9E7522; color: var(--green); }
  .tag-collab  { background: #378ADD22; color: var(--blue); }
  .tag-wrapup  { background: #1D9E7522; color: var(--green); }
  .tag-error   { background: #E24B4A22; color: #E24B4A; }
  .msg-text {
    font-size: 13px; line-height: 1.55; color: var(--text);
  }
  .msg.type-kickoff .msg-text { color: #b8b4f0; }
  .msg.type-wrapup  .msg-text { color: #7DCDB0; }
  .msg.type-collab  .msg-text { color: #8BBDE8; }
  .msg.type-error   .msg-text { color: #E87878; }

  /* Typing indicator */
  .typing { display: flex; align-items: center; gap: 6px; padding: 10px 0; color: var(--text3); font-size: 12px; }
  .dot-bounce { display: flex; gap: 3px; }
  .dot-bounce span {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text3); display: inline-block;
    animation: bounce .8s infinite;
  }
  .dot-bounce span:nth-child(2) { animation-delay: .12s; }
  .dot-bounce span:nth-child(3) { animation-delay: .24s; }

  @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:.2} }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }

  /* ── Examples ── */
  #examples {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 8px 24px; border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .ex-chip {
    font-size: 11px; padding: 3px 10px; border-radius: 20px;
    border: 1px solid var(--border2); color: var(--text2); background: transparent;
    cursor: pointer; transition: all .15s;
  }
  .ex-chip:hover { border-color: var(--accent); color: var(--text); }
  .ex-chip:disabled { opacity: .4; cursor: not-allowed; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div>
    <h1>Agent Team Simulator</h1>
    <p>On-premise · Ollama</p>
  </div>
  <div class="header-right">
    <div id="conn-dot"></div>
    <span id="conn-label" style="font-size:11px;color:var(--text2)">Not checked</span>
    <button class="pill" onclick="checkOllama()">Check connection</button>
  </div>
</header>

<div id="config-bar">
  <label>Ollama host</label>
  <input id="ollamaHost" value="http://10.123.0.218:8080" style="width:200px">
  <div class="sep"></div>
  <label>Model</label>
  <input id="modelName" value="qwen3:30b" style="width:180px" placeholder="e.g. qwen3:30b">
  <button class="btn btn-ghost" style="padding:4px 12px;font-size:11px" onclick="fetchModels()">↻ List models</button>
  <select id="modelSelect" style="display:none;width:200px" onchange="document.getElementById('modelName').value=this.value"></select>
  <div class="sep"></div>
  <label style="display:flex;align-items:center;gap:5px;cursor:pointer">
    <input type="checkbox" id="streamToggle" checked> Stream responses
  </label>
</div>

<div id="examples">
  <span style="font-size:11px;color:var(--text3);align-self:center">Examples:</span>
</div>

<div class="layout">
  <div class="project-bar">
    <input id="projectInput" type="text" placeholder="Describe your startup project… e.g. Real-time AI code review platform for engineering teams">
    <button class="btn btn-primary" id="launchBtn" onclick="launch()">Launch ↗</button>
    <button class="btn btn-ghost" id="resetBtn" onclick="resetAll()" style="display:none">Reset</button>
  </div>

  <div id="team-panel">
    <div class="panel-label">Team</div>
  </div>

  <div id="feed-panel">
    <div class="feed-empty" id="feed-empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M17 8h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2v4l-4-4H9a1.994 1.994 0 0 1-1.414-.586"/>
        <path d="M7 8V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-1"/>
      </svg>
      <p>Launch a project to see your team coordinate</p>
    </div>
  </div>
</div>

<script>
// ── Agent definitions ──
const AGENTS = [
  { id:"lead",    name:"Marcus Chen",  role:"CTO · Team Lead",     initials:"MC", hue:"#7F77DD" },
  { id:"pm",      name:"Emma Walsh",   role:"Product Manager",     initials:"EW", hue:"#D85A30" },
  { id:"backend", name:"Sarah Kim",    role:"Backend Engineer",    initials:"SK", hue:"#1D9E75" },
  { id:"frontend",name:"Alex Rivera",  role:"Frontend Engineer",   initials:"AR", hue:"#378ADD" },
  { id:"ai",      name:"Priya Patel",  role:"AI / ML Engineer",    initials:"PP", hue:"#D4537E" },
  { id:"devops",  name:"Jordan Lee",   role:"DevOps Engineer",     initials:"JL", hue:"#BA7517" },
];
const byId = Object.fromEntries(AGENTS.map(a => [a.id, a]));

const EXAMPLES = [
  "AI-powered customer support platform with live chat and ticket routing",
  "Real-time collaborative whiteboard with AI drawing assistance",
  "Automated trading analytics dashboard with ML price predictions",
  "Multi-tenant SaaS HR platform with onboarding automation",
];

// Render example chips
const exRow = document.getElementById("examples");
EXAMPLES.forEach(ex => {
  const b = document.createElement("button");
  b.className = "ex-chip";
  b.textContent = ex.length > 55 ? ex.slice(0, 53) + "…" : ex;
  b.title = ex;
  b.onclick = () => { document.getElementById("projectInput").value = ex; launch(); };
  exRow.appendChild(b);
});

// Render team cards
const teamPanel = document.getElementById("team-panel");
const lbl = teamPanel.querySelector(".panel-label");
AGENTS.forEach(ag => {
  const card = document.createElement("div");
  card.className = "agent-card";
  card.id = `card-${ag.id}`;
  card.style.borderLeftColor = ag.hue;
  card.innerHTML = `
    <div class="agent-card-head">
      <div class="avatar" style="background:${ag.hue}22;color:${ag.hue}">${ag.initials}</div>
      <div>
        <div class="agent-name">${ag.name}</div>
        <div class="agent-role">${ag.role}</div>
      </div>
      <div class="status-badge">
        <div class="sdot" id="sdot-${ag.id}"></div>
        <span id="slabel-${ag.id}">Standby</span>
      </div>
    </div>
    <div class="task-block" id="task-${ag.id}">
      <div class="task-title">
        <span id="task-title-${ag.id}"></span>
        <span class="pri" id="task-pri-${ag.id}"></span>
      </div>
      <div class="task-desc" id="task-desc-${ag.id}"></div>
    </div>`;
  teamPanel.appendChild(card);
});

// ── State ──
let running = false;

function setStatus(id, status) {
  const dot = document.getElementById(`sdot-${id}`);
  const lbl = document.getElementById(`slabel-${id}`);
  const labels = { idle:"Standby", assigned:"Assigned", thinking:"Thinking…", active:"Active", done:"Done" };
  dot.className = `sdot ${status}`;
  lbl.textContent = labels[status] || "Standby";
}

function setTask(id, task) {
  const block = document.getElementById(`task-${id}`);
  const t = document.getElementById(`task-title-${id}`);
  const d = document.getElementById(`task-desc-${id}`);
  const p = document.getElementById(`task-pri-${id}`);
  t.textContent = task.title;
  d.textContent = task.description;
  p.textContent = task.priority;
  p.className = `pri ${task.priority}`;
  block.classList.add("show");
}

const feedPanel = document.getElementById("feed-panel");
const feedEmpty = document.getElementById("feed-empty");

function addMsg(from, to, content, type) {
  feedEmpty.style.display = "none";
  const ag = byId[from];
  const toAg = to !== "all" ? byId[to] : null;
  const tagMap = {
    kickoff:"kickoff",update:"update",collab:"collab",wrapup:"wrapup",error:"error"
  };
  const tagLabel = {kickoff:"kickoff",update:"update",collab:"collab",wrapup:"wrap-up",error:"error"};
  const div = document.createElement("div");
  div.className = `msg type-${type}`;
  div.innerHTML = `
    <div class="msg-avatar" style="background:${ag.hue}28;color:${ag.hue}">${ag.initials}</div>
    <div class="msg-body">
      <div class="msg-head">
        <span class="msg-from" style="color:${ag.hue}">${ag.name}</span>
        ${toAg ? `<span class="msg-arrow">→</span><span class="msg-to">${toAg.name}</span>` : ""}
        ${to === "all" ? `<span class="msg-arrow">→</span><span class="msg-to" style="color:var(--text3)">All</span>` : ""}
        <span class="msg-tag tag-${tagMap[type]||'update'}">${tagLabel[type]||type}</span>
        <span class="msg-time">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
      </div>
      <div class="msg-text">${escHtml(content)}</div>
    </div>`;
  feedPanel.appendChild(div);
  feedPanel.scrollTop = feedPanel.scrollHeight;
}

let typingEl = null;
function showTyping(name) {
  removeTyping();
  typingEl = document.createElement("div");
  typingEl.className = "typing";
  typingEl.innerHTML = `<div class="dot-bounce"><span></span><span></span><span></span></div><span>${name} is thinking…</span>`;
  feedPanel.appendChild(typingEl);
  feedPanel.scrollTop = feedPanel.scrollHeight;
}
function removeTyping() {
  if (typingEl) { typingEl.remove(); typingEl = null; }
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
}

// ── Ollama API ──
function getHost() { return document.getElementById("ollamaHost").value.replace(/\/$/, ""); }
function getModel() { return document.getElementById("modelName").value.trim(); }

async function checkOllama() {
  const dot = document.getElementById("conn-dot");
  const lbl = document.getElementById("conn-label");
  dot.className = "";
  lbl.textContent = "Checking…";
  try {
    const r = await fetch(`${getHost()}/api/tags`, { signal: AbortSignal.timeout(4000) });
    if (r.ok) {
      dot.className = "ok";
      const d = await r.json();
      const count = (d.models||[]).length;
      lbl.textContent = `Connected · ${count} model${count!==1?"s":""}`;
    } else throw new Error();
  } catch {
    dot.className = "fail";
    lbl.textContent = "Cannot reach Ollama";
  }
}

async function fetchModels() {
  try {
    const r = await fetch(`${getHost()}/api/tags`);
    const d = await r.json();
    const sel = document.getElementById("modelSelect");
    sel.innerHTML = "";
    (d.models||[]).forEach(m => {
      const o = document.createElement("option");
      o.value = m.name; o.textContent = m.name;
      if (m.name === getModel()) o.selected = true;
      sel.appendChild(o);
    });
    sel.style.display = "block";
  } catch(e) {
    alert("Failed to fetch models. Check Ollama host.");
  }
}

async function ollamaChat(systemPrompt, userMsg) {
  const useStream = document.getElementById("streamToggle").checked;
  const body = {
    model: getModel(),
    messages: [
      { role:"system", content: systemPrompt },
      { role:"user",   content: userMsg }
    ],
    stream: false,
    options: { temperature: 0.7 }
  };

  const r = await fetch(`${getHost()}/api/chat`, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify(body)
  });
  if (!r.ok) throw new Error(`Ollama error: ${r.status}`);
  const d = await r.json();
  const text = d.message?.content || "";

  // Strip <think>...</think> blocks (Qwen3 chain-of-thought)
  const cleaned = text.replace(/<think>[\s\S]*?<\/think>/gi, "").trim();

  // Extract JSON
  const fenced = cleaned.match(/```json([\s\S]*?)```/);
  if (fenced) return JSON.parse(fenced[1].trim());
  const braced = cleaned.match(/\{[\s\S]*\}/);
  if (braced) return JSON.parse(braced[0]);
  throw new Error("No JSON in response: " + cleaned.slice(0, 200));
}

// ── Main flow ──
async function launch() {
  const proj = document.getElementById("projectInput").value.trim();
  if (!proj || running) return;
  running = true;

  document.getElementById("launchBtn").disabled = true;
  document.getElementById("launchBtn").textContent = "Running…";
  document.getElementById("resetBtn").style.display = "none";
  document.querySelectorAll(".ex-chip").forEach(c => c.disabled = true);

  // Reset state
  AGENTS.forEach(ag => {
    setStatus(ag.id, "idle");
    const tb = document.getElementById(`task-${ag.id}`);
    tb.classList.remove("show");
  });
  feedPanel.querySelectorAll(".msg,.typing").forEach(el => el.remove());
  feedEmpty.style.display = "flex";

  const delay = ms => new Promise(r => setTimeout(r, ms));

  try {
    // ── Phase 1: Team Lead plans ──
    setStatus("lead", "thinking");
    showTyping("Marcus Chen");

    const leadSys = `You are Marcus Chen, CTO and Team Lead of a startup. Your team:
- Emma Walsh (id: pm) — Product Manager
- Sarah Kim (id: backend) — Backend Engineer
- Alex Rivera (id: frontend) — Frontend Engineer
- Priya Patel (id: ai) — AI / ML Engineer
- Jordan Lee (id: devops) — DevOps Engineer

Respond ONLY with valid JSON (no markdown fences, no preamble, no chain-of-thought text):
{"announcement":"Your kickoff message to the team (2-3 sentences, energetic and specific to the project)","tasks":[{"assignee":"pm|backend|frontend|ai|devops","title":"Short task title","description":"2-sentence concrete description of what to build or do","priority":"high|medium|low"}]}
Include exactly one task per member (all 5 members).`;

    const lead = await ollamaChat(leadSys, `Project: ${proj}`);
    removeTyping();
    setStatus("lead", "active");
    addMsg("lead", "all", lead.announcement, "kickoff");

    const taskMap = {};
    for (const t of (lead.tasks || [])) {
      taskMap[t.assignee] = t;
      setTask(t.assignee, t);
      setStatus(t.assignee, "assigned");
    }

    await delay(600);

    // ── Phase 2: Members respond ──
    const order = ["pm", "backend", "frontend", "ai", "devops"];
    const responses = {};

    for (const mid of order) {
      const task = taskMap[mid];
      if (!task) continue;
      const ag = byId[mid];

      setStatus(mid, "thinking");
      showTyping(ag.name);
      await delay(400);

      const mSys = `You are ${ag.name}, ${ag.role} at a startup.
You report to Marcus Chen (CTO). Project: "${proj}"
Your task: "${task.title}" — ${task.description}

Respond ONLY with valid JSON (no markdown fences, no preamble):
{"statusUpdate":"Your 2-3 sentence response to the CTO: confirm the task, state your concrete plan, and mention one specific technical decision","collaborations":[{"toAgent":"pm|backend|frontend|ai|devops","message":"A specific coordination question or dependency note"}]}
Include 1-2 collaborations only where there is a real cross-team dependency.`;

      const mr = await ollamaChat(mSys, `Task: ${task.title}\n${task.description}`);
      responses[mid] = mr;
      removeTyping();
      setStatus(mid, "active");
      addMsg(mid, "lead", mr.statusUpdate, "update");
      await delay(350);

      for (const c of (mr.collaborations || [])) {
        if (byId[c.toAgent] && c.toAgent !== mid) {
          await delay(250);
          addMsg(mid, c.toAgent, c.message, "collab");
        }
      }
    }

    // ── Phase 3: Team Lead wraps up ──
    await delay(700);
    setStatus("lead", "thinking");
    showTyping("Marcus Chen");

    const sumSys = `You are Marcus Chen, CTO. Your team just reported back on their tasks.
Respond ONLY with valid JSON (no markdown fences, no preamble):
{"summary":"2-sentence wrap-up to the team: acknowledge the solid plans and state the very next concrete step (first sprint, sync call, or milestone deadline)."}`;

    const teamSummary = Object.entries(responses)
      .map(([id,r]) => `${byId[id]?.name}: ${r.statusUpdate}`).join("\n");
    const sum = await ollamaChat(sumSys, `Project: ${proj}\nTeam updates:\n${teamSummary}`);

    removeTyping();
    setStatus("lead", "done");
    addMsg("lead", "all", sum.summary, "wrapup");
    order.forEach(id => setStatus(id, "done"));

  } catch(e) {
    removeTyping();
    console.error(e);
    addMsg("lead", "all", `Error: ${e.message}. Check your Ollama host and model name.`, "error");
  }

  running = false;
  document.getElementById("launchBtn").disabled = false;
  document.getElementById("launchBtn").textContent = "Launch ↗";
  document.getElementById("resetBtn").style.display = "block";
}

function resetAll() {
  AGENTS.forEach(ag => {
    setStatus(ag.id, "idle");
    document.getElementById(`task-${ag.id}`).classList.remove("show");
  });
  feedPanel.querySelectorAll(".msg,.typing").forEach(el => el.remove());
  feedEmpty.style.display = "flex";
  document.getElementById("resetBtn").style.display = "none";
  document.getElementById("launchBtn").textContent = "Launch ↗";
  document.querySelectorAll(".ex-chip").forEach(c => c.disabled = false);
}

// Auto-check on load
window.addEventListener("load", () => setTimeout(checkOllama, 500));
</script>
</body>
</html>
