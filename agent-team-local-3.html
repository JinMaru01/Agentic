<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Team · On-Premise</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #0e0f11;
      --bg2: #161820;
      --bg3: #1e2028;
      --bg4: #252730;
      --border: #2a2c36;
      --border2: #373a47;
      --text: #e4e6f0;
      --text2: #9095a8;
      --text3: #52566a;
      --accent: #7F77DD;
      --green: #1D9E75;
      --blue: #378ADD;
      --pink: #D4537E;
      --amber: #BA7517;
      --coral: #D85A30;
      --red: #E24B4A;
      --r: 8px;
      --rl: 12px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-size: 13px
    }

    /* Header */
    header {
      flex-shrink: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .logo {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: linear-gradient(135deg, var(--accent), #4a41aa);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0
    }

    header h1 {
      font-size: 14px;
      font-weight: 600
    }

    header small {
      font-size: 11px;
      color: var(--text3)
    }

    .hright {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px
    }

    #cdot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0
    }

    #cdot.ok {
      background: var(--green)
    }

    #cdot.fail {
      background: var(--red)
    }

    #clbl {
      font-size: 11px;
      color: var(--text2)
    }

    .hbtn {
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid var(--border2);
      color: var(--text2);
      background: transparent;
      cursor: pointer;
      transition: all .15s
    }

    .hbtn:hover {
      border-color: var(--accent);
      color: var(--accent)
    }

    /* Config */
    #cfg {
      flex-shrink: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 7px 20px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap
    }

    #cfg label {
      font-size: 11px;
      color: var(--text3)
    }

    #cfg input,
    #cfg select {
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      outline: none;
      transition: border-color .15s
    }

    #cfg input:focus,
    #cfg select:focus {
      border-color: var(--accent)
    }

    .csep {
      width: 1px;
      height: 18px;
      background: var(--border);
      flex-shrink: 0
    }

    /* Examples */
    #exrow {
      flex-shrink: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 6px 20px;
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap
    }

    .echip {
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 16px;
      border: 1px solid var(--border2);
      color: var(--text3);
      background: transparent;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap
    }

    .echip:hover {
      border-color: var(--accent);
      color: var(--text)
    }

    .echip:disabled {
      opacity: .35;
      cursor: not-allowed
    }

    /* Project bar */
    #pbar {
      flex-shrink: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      gap: 8px;
      align-items: center
    }

    #pbar input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border2);
      color: var(--text);
      border-radius: var(--r);
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
      transition: border-color .15s
    }

    #pbar input:focus {
      border-color: var(--accent)
    }

    #pbar input::placeholder {
      color: var(--text3)
    }

    .btn {
      padding: 7px 16px;
      border-radius: var(--r);
      border: none;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      white-space: nowrap
    }

    .btn-p {
      background: var(--accent);
      color: #fff
    }

    .btn-p:hover {
      background: #6b62cc
    }

    .btn-p:disabled {
      opacity: .4;
      cursor: not-allowed
    }

    .btn-g {
      background: var(--bg3);
      color: var(--text2);
      border: 1px solid var(--border2)
    }

    .btn-g:hover {
      color: var(--text)
    }

    /* 3-col layout */
    #main {
      flex: 1;
      display: grid;
      grid-template-columns: 248px 1fr 0px;
      min-height: 0;
      transition: grid-template-columns .35s ease
    }

    #main.show-arts {
      grid-template-columns: 248px 1fr 338px
    }

    /* Team panel */
    #team {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      background: var(--bg)
    }

    .plbl {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .1em;
      color: var(--text3);
      text-transform: uppercase;
      padding-bottom: 4px
    }

    .acard {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-left: 3px solid transparent;
      border-radius: var(--r);
      padding: 9px 11px
    }

    .ahead {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      flex-shrink: 0
    }

    .aname {
      font-size: 12px;
      font-weight: 600
    }

    .arole {
      font-size: 10px;
      color: var(--text2)
    }

    .sbadge {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0
    }

    .sdot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text3);
      flex-shrink: 0
    }

    .sdot.assigned {
      background: var(--amber)
    }

    .sdot.thinking {
      background: var(--blue);
      animation: pulse 1s infinite
    }

    .sdot.active {
      background: var(--accent)
    }

    .sdot.done {
      background: var(--green)
    }

    .slbl {
      font-size: 10px;
      color: var(--text3)
    }

    .tblock {
      margin-top: 7px;
      background: var(--bg3);
      border-radius: 6px;
      padding: 7px 9px;
      display: none
    }

    .tblock.show {
      display: block
    }

    .ttitle {
      font-size: 11px;
      font-weight: 600;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 4px;
      margin-bottom: 3px
    }

    .tdesc {
      font-size: 10px;
      color: var(--text2);
      line-height: 1.45
    }

    .pri {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0
    }

    .pri.high {
      background: #D85A3020;
      color: #F0997B
    }

    .pri.medium {
      background: #BA751720;
      color: #FAC775
    }

    .pri.low {
      background: #1D9E7520;
      color: #5DCAA5
    }

    /* Feed */
    #feed {
      overflow-y: auto;
      padding: 12px 16px;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 0
    }

    .fempty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text3);
      padding: 60px 0;
      text-align: center
    }

    .fempty svg {
      opacity: .2
    }

    .fempty p {
      font-size: 12px;
      max-width: 240px;
      line-height: 1.5
    }

    .msg {
      display: flex;
      gap: 9px;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      animation: fadein .2s ease
    }

    .msg:last-child {
      border-bottom: none
    }

    .mav {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px
    }

    .mbody {
      flex: 1;
      min-width: 0
    }

    .mhead {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-bottom: 3px;
      flex-wrap: wrap
    }

    .mfrom {
      font-size: 11px;
      font-weight: 700
    }

    .marrow {
      font-size: 10px;
      color: var(--text3)
    }

    .mto {
      font-size: 11px;
      color: var(--text2)
    }

    .mtime {
      font-size: 10px;
      color: var(--text3);
      margin-left: auto
    }

    .mtag {
      font-size: 9px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600
    }

    .tag-kickoff {
      background: #7F77DD20;
      color: var(--accent)
    }

    .tag-update {
      background: #1D9E7520;
      color: var(--green)
    }

    .tag-collab {
      background: #378ADD20;
      color: var(--blue)
    }

    .tag-wrapup {
      background: #1D9E7520;
      color: #5DCAA5
    }

    .tag-artifact {
      background: #BA751720;
      color: #FAC775
    }

    .tag-error {
      background: #E24B4A20;
      color: var(--red)
    }

    .mtext {
      font-size: 12px;
      line-height: 1.55;
      color: var(--text)
    }

    .type-kickoff .mtext {
      color: #b0ace8
    }

    .type-wrapup .mtext {
      color: #6ec8a8
    }

    .type-collab .mtext {
      color: #85b8e6
    }

    .type-artifact .mtext {
      color: #d4b06a
    }

    .type-error .mtext {
      color: #e08080
    }

    .typing {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 0;
      color: var(--text3);
      font-size: 11px
    }

    .dbc {
      display: flex;
      gap: 3px
    }

    .dbc span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--text3);
      animation: bounce .8s infinite
    }

    .dbc span:nth-child(2) {
      animation-delay: .12s
    }

    .dbc span:nth-child(3) {
      animation-delay: .24s
    }

    /* Artifacts panel */
    #arts {
      border-left: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      background: var(--bg)
    }

    .arts-hd {
      flex-shrink: 0;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      display: flex;
      align-items: center;
      gap: 6px
    }

    .arts-hd svg {
      flex-shrink: 0;
      opacity: .6
    }

    .arts-hd span {
      font-size: 11px;
      font-weight: 700;
      color: var(--text2)
    }

    #arts-count {
      font-size: 10px;
      color: var(--text3)
    }

    .prog-wrap {
      flex: 1;
      display: none
    }

    .prog-bar {
      height: 3px;
      background: var(--bg3);
      border-radius: 2px;
      overflow: hidden
    }

    .prog-fill {
      height: 100%;
      background: var(--accent);
      transition: width .4s ease;
      border-radius: 2px;
      width: 0%
    }

    #arts-inner {
      overflow-y: auto;
      flex: 1;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 7px
    }

    #arts-footer {
      flex-shrink: 0;
      padding: 9px 10px;
      border-top: 1px solid var(--border);
      background: var(--bg2);
      display: none
    }

    /* Artifact cards */
    .artcard {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      animation: fadein .25s ease
    }

    .artcard-hd {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 10px;
      cursor: pointer;
      user-select: none;
      transition: background .15s
    }

    .artcard-hd:hover {
      background: var(--bg3)
    }

    .ftype {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      font-weight: 700;
      flex-shrink: 0
    }

    .ft-md {
      background: #BA751720;
      color: #FAC775
    }

    .ft-yaml,
    .ft-yml {
      background: #1D9E7520;
      color: #5DCAA5
    }

    .ft-sql {
      background: #378ADD20;
      color: #85b8e6
    }

    .ft-py {
      background: #1D9E7520;
      color: #7DCDB0
    }

    .ft-tsx,
    .ft-ts {
      background: #378ADD20;
      color: #60aadc
    }

    .ft-json {
      background: #D85A3020;
      color: #F0997B
    }

    .ft-txt {
      background: #7F77DD20;
      color: #b0ace8
    }

    .fname {
      font-size: 12px;
      font-weight: 600;
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .fagent {
      font-size: 10px;
      color: var(--text3);
      flex-shrink: 0
    }

    .farrow {
      font-size: 11px;
      color: var(--text3);
      flex-shrink: 0
    }

    .artcard-body {
      display: none
    }

    .artcard-body.open {
      display: block
    }

    .artcard pre {
      padding: 10px 12px;
      font-size: 11px;
      line-height: 1.5;
      overflow: auto;
      max-height: 280px;
      font-family: 'Cascadia Code', 'Fira Code', Consolas, monospace;
      color: #c8cfe0;
      background: var(--bg);
      border: none;
      white-space: pre
    }

    .art-acts {
      display: flex;
      gap: 6px;
      padding: 7px 10px;
      border-top: 1px solid var(--border);
      background: var(--bg3);
      align-items: center
    }

    .abtn {
      font-size: 10px;
      padding: 3px 9px;
      border-radius: 4px;
      border: 1px solid var(--border2);
      color: var(--text2);
      background: transparent;
      cursor: pointer;
      transition: all .15s
    }

    .abtn:hover {
      color: var(--text)
    }

    .abtn.ok {
      color: var(--green);
      border-color: var(--green)
    }

    .alines {
      font-size: 10px;
      color: var(--text3);
      margin-left: auto
    }

    .artcard-loading {
      padding: 12px 10px;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--text3);
      font-size: 11px
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .2
      }
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-4px)
      }
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(4px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">🤖</div>
    <div>
      <h1>Agent Team <small>· On-Premise</small></h1>
    </div>
    <div class="hright">
      <div id="cdot"></div>
      <span id="clbl">Not checked</span>
      <button class="hbtn" onclick="checkOllama()">Check connection</button>
    </div>
  </header>

  <div id="cfg">
    <label>Host</label>
    <input id="ollamaHost" value="http://10.123.0.218:8080" style="width:195px">
    <div class="csep"></div>
    <label>Model</label>
    <input id="modelName" value="qwen3:30b" style="width:155px" placeholder="model name">
    <button class="hbtn" onclick="fetchModels()">↻ List models</button>
    <select id="modelSel" style="display:none;width:185px"
      onchange="document.getElementById('modelName').value=this.value"></select>
    <div class="csep"></div>
    <label style="display:flex;align-items:center;gap:5px;cursor:pointer">
      <input type="checkbox" id="thinkToggle" checked> Strip &lt;think&gt;
    </label>
  </div>

  <div id="exrow">
    <span style="font-size:10px;color:var(--text3);flex-shrink:0">Try:</span>
  </div>

  <div id="pbar">
    <input id="proj" type="text"
      placeholder="Describe your startup project — e.g. Real-time AI code review platform for engineering teams">
    <button class="btn btn-p" id="launchBtn" onclick="launch()">Launch ↗</button>
    <button class="btn btn-g" id="resetBtn" onclick="resetAll()" style="display:none">Reset</button>
  </div>

  <div id="main">
    <!-- Team -->
    <div id="team">
      <div class="plbl">Team</div>
    </div>
    <!-- Feed -->
    <div id="feed">
      <div class="fempty" id="fempty">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
        </svg>
        <p>Launch a project — your team will plan, coordinate, and generate code &amp; docs</p>
      </div>
    </div>
    <!-- Artifacts -->
    <div id="arts">
      <div class="arts-hd">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
          <polyline points="14 2 14 8 20 8" />
        </svg>
        <span>Artifacts</span>
        <span id="arts-count">0 files</span>
        <div class="prog-wrap" id="prog-wrap">
          <div class="prog-bar">
            <div class="prog-fill" id="pf"></div>
          </div>
        </div>
      </div>
      <div id="arts-inner"></div>
      <div id="arts-footer">
        <button class="btn btn-g" style="width:100%;font-size:11px" onclick="downloadAll()">⬇ Download All
          Files</button>
      </div>
    </div>
  </div>

  <script>
    // ══════════════════════════════════════
    // AGENTS
    // ══════════════════════════════════════
    const AGENTS = [
      { id: "lead", name: "Marcus Chen", role: "CTO · Team Lead", initials: "MC", hue: "#7F77DD" },
      { id: "pm", name: "Emma Walsh", role: "Product Manager", initials: "EW", hue: "#D85A30" },
      { id: "backend", name: "Sarah Kim", role: "Backend Engineer", initials: "SK", hue: "#1D9E75" },
      { id: "frontend", name: "Alex Rivera", role: "Frontend Engineer", initials: "AR", hue: "#378ADD" },
      { id: "ai", name: "Priya Patel", role: "AI / ML Engineer", initials: "PP", hue: "#D4537E" },
      { id: "devops", name: "Jordan Lee", role: "DevOps Engineer", initials: "JL", hue: "#BA7517" },
    ];
    const byId = Object.fromEntries(AGENTS.map(a => [a.id, a]));

    // ══════════════════════════════════════
    // ARTIFACT SPECS
    // Each entry: { filename, desc, system(proj, taskDesc) }
    // ══════════════════════════════════════
    const ART = {
      pm: [
        {
          filename: "PRD.md", desc: "Product Requirements",
          system: (proj, task) =>
            `You are Emma Walsh, Product Manager. Write a full PRD in Markdown for the project below.
Project: ${proj}
Your scope: ${task}

Output ONLY the Markdown document — no preamble, no code fences. Structure:
# [Project Name] — Product Requirements Document
## Executive Summary
## Problem Statement
## Target Users & Personas (at least 2 personas)
## User Stories (minimum 7, format: As a [user] I want [feature] so that [benefit])
## Functional Requirements (numbered list, specific and technical)
## Non-Functional Requirements (performance, security, scalability)
## Out of Scope
## Success Metrics & KPIs
## Release Milestones` },
      ],
      backend: [
        {
          filename: "openapi.yaml", desc: "OpenAPI 3.0 Spec",
          system: (proj, task) =>
            `You are Sarah Kim, Backend Engineer. Generate a complete OpenAPI 3.0 specification in YAML.
Project: ${proj}
Backend scope: ${task}

Output ONLY valid YAML — no preamble, no code fences. Include:
- openapi: "3.0.0" and info block (title, description, version)
- servers block (localhost:8000 and a staging URL)
- At least 8 REST endpoints relevant to the project with full request/response schemas
- components/schemas with all data models
- Proper HTTP methods, status codes (200, 201, 400, 401, 404, 500), and descriptions
- Security schemes (Bearer token)` },
        {
          filename: "schema.sql", desc: "PostgreSQL Schema",
          system: (proj, task) =>

    // ══════════════════════════════════════

    // ══════════════════════════════════════
    // UI HELPERS
    // ══════════════════════════════════════
    function setStatus(id, s) {
      const map = { idle: "Standby", assigned: "Assigned", thinking: "Thinking…", active: "Active", done: "Done" };
      const dot = document.getElementById(`sdot-${id}`);

    function setTask(id, task) {
      document.getElementById(`tt-${id}`).textContent = task.title;
      document.getElementById(`td-${id}`).textContent = task.description;
      const p = document.getElementById(`tp-${id}`);
      p.textContent = task.priority; p.className = `pri ${task.priority}`;
      document.getElementById(`tb-${id}`).classList.add("show");
    }

    let typingEl = null;
    function showTyping(name) {
      removeTyping();
      typingEl = document.createElement("div"); typingEl.className = "typing";
      typingEl.innerHTML = `<div class="dbc"><span></span><span></span><span></span></div><span>${name} is thinking…</span>`;
      document.getElementById("feed").appendChild(typingEl);
      scrollFeed();
    }
    function removeTyping() { if (typingEl) { typingEl.remove(); typingEl = null; } }

    function addMsg(from, to, content, type) {
      document.getElementById("fempty").style.display = "none";
      const ag = byId[from]; const toAg = to !== "all" ? byId[to] : null;
      const tagL = { kickoff: "kickoff", update: "update", collab: "collab", wrapup: "wrap-up", artifact: "artifact", error: "error" };
      const div = document.createElement("div"); div.className = `msg type-${type}`;
      div.innerHTML = `
    <div class="mav" style="background:${ag.hue}22;color:${ag.hue}">${ag.initials}</div>

      <div class="mhead">

        ${to === "all" ? `<span class="marrow">→</span><span class="mto" style="color:var(--text3)">All</span>` : ""}
        <span class="mtag tag-${type}">${tagL[type] || type}</span>

      document.getElementById("feed").appendChild(div);

    function esc(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>"); }

    // ══════════════════════════════════════
    // ARTIFACT CARDS
    // ══════════════════════════════════════
    const extCls = { md: "ft-md", yaml: "ft-yaml", yml: "ft-yml", sql: "ft-sql", py: "ft-py", tsx: "ft-tsx", ts: "ft-tsx", json: "ft-json", txt: "ft-txt" };

    function bumpProgress() {
      artDone++;

      document.getElementById("arts-count").textContent = `${artDone} / ${artTotal} files`;

    function showArtsPanel() {
      const m = document.getElementById("main");

      document.getElementById("arts-footer").style.display = "block";

    function addLoadingCard(agId, filename) {
      showArtsPanel();
      const ag = byId[agId]; const ext = filename.split(".").pop().toLowerCase();
      const id = `ld-${filename.replace(/[^a-z0-9]/gi, "_")}`;
      const card = document.createElement("div"); card.id = id; card.className = "artcard";
      card.innerHTML = `
    <div class="artcard-hd" style="cursor:default">
      <span class="ftype ${extCls[ext] || "ft-txt"}">.${ext}</span>
      <span class="fname">${filename}</span>
      <span class="fagent">${ag.name}</span>
    </div>
    <div class="artcard-loading">
      <div class="dbc"><span></span><span></span><span></span></div>
      <span>Generating…</span>
    </div>`;
      document.getElementById("arts-inner").appendChild(card);
      const ai = document.getElementById("arts-inner"); ai.scrollTop = ai.scrollHeight;
      return id;
    }

    function replaceWithArtifact(loadId, agId, filename, desc, content) {
      const old = document.getElementById(loadId);
      const ag = byId[agId]; const ext = filename.split(".").pop().toLowerCase();
      const safeId = filename.replace(/[^a-z0-9]/gi, "_");
      const lines = content.split("\n").length;
      allArtifacts.push({ filename, content });
      bumpProgress();

      const card = document.createElement("div"); card.className = "artcard";
      card.innerHTML = `
    <div class="artcard-hd" onclick="toggleArt(this)">
      <span class="ftype ${extCls[ext] || "ft-txt"}">.${ext}</span>
      <span class="fname">${filename}</span>
      <span class="fagent">${ag.name}</span>
      <span class="alines">${lines}L</span>
      <span class="farrow">▸</span>
    </div>
    <div class="artcard-body">
      <pre id="pre-${safeId}">${escPre(content)}</pre>
      <div class="art-acts">
        <button class="abtn" onclick="copyArt('${safeId}',this)">Copy</button>
        <button class="abtn" onclick="dlFile('${filename}','${safeId}')">↓ Download</button>
        <span class="alines">${desc}</span>
      </div>
    </div>`;
      if (old) old.replaceWith(card);
      else document.getElementById("arts-inner").appendChild(card);
      // Auto-expand first artifact
      if (allArtifacts.length === 1) toggleArt(card.querySelector(".artcard-hd"));
    }

    function toggleArt(hd) {
      const body = hd.nextElementSibling;
      const arrow = hd.querySelector(".farrow");
      const open = body.classList.contains("open");
      body.classList.toggle("open", !open);
      if (arrow) arrow.textContent = open ? "▸" : "▾";
    }

    function escPre(s) { return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); }
    function copyArt(id, btn) {
      navigator.clipboard.writeText(document.getElementById(`pre-${id}`).textContent)
        .then(() => { btn.textContent = "Copied!"; btn.classList.add("ok"); setTimeout(() => { btn.textContent = "Copy"; btn.classList.remove("ok"); }, 1500); });
    }
    function dlFile(name, id) {
      const a = document.createElement("a");
      a.href = URL.createObjectURL(new Blob([document.getElementById(`pre-${id}`).textContent], { type: "text/plain" }));
      a.download = name; a.click(); URL.revokeObjectURL(a.href);
    }
    async function downloadAll() {
      for (const { filename, content } of allArtifacts) {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([content], { type: "text/plain" }));
        a.download = filename; a.click(); URL.revokeObjectURL(a.href);
        await delay(350);
      }
    }

    // ══════════════════════════════════════
    // OLLAMA API
    // ══════════════════════════════════════
    const getHost = () => document.getElementById("ollamaHost").value.replace(/\/$/, "");
    const getModel = () => document.getElementById("modelName").value.trim();

    function stripThink(t) {
      return document.getElementById("thinkToggle").checked
        ? t.replace(/<think>[\s\S]*?<\/think>/gi, "").trim()
        : t;
    }
    function parseJSON(raw) {
      const t = stripThink(raw);
      const fenced = t.match(/```(?:json)?\s*([\s\S]*?)```/);
      const src = fenced ? fenced[1].trim() : t;
      const m = src.match(/\{[\s\S]*\}/);
      if (m) return JSON.parse(m[0]);
      throw new Error("No JSON in: " + src.slice(0, 100));
    }
    function cleanCode(raw) {
      let t = stripThink(raw);
      // Strip wrapping code fences
      t = t.replace(/^```[\w]*\s*\n?/, "").replace(/\n?```\s*$/, "").trim();
      return t;
    }

    async function ollamaJSON(sys, user, maxTok = 650) {
      const r = await fetch(`${getHost()}/api/chat`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: getModel(), stream: false,
          messages: [{ role: "system", content: sys }, { role: "user", content: user }],
          options: { temperature: 0.65, num_predict: maxTok }
        })
      });
      if (!r.ok) throw new Error(`Ollama HTTP ${r.status}`);
      const d = await r.json();
      return parseJSON(d.message?.content || "");
    }

    async function ollamaText(sys, user, maxTok = 2800) {
      const r = await fetch(`${getHost()}/api/chat`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: getModel(), stream: false,
          messages: [{ role: "system", content: sys }, { role: "user", content: user }],
          options: { temperature: 0.2, num_predict: maxTok }
        })
      });
      if (!r.ok) throw new Error(`Ollama HTTP ${r.status}`);
      const d = await r.json();
      return cleanCode(d.message?.content || "");
    }

    // ══════════════════════════════════════
    // MAIN LAUNCH
    // ══════════════════════════════════════
    const delay = ms => new Promise(r => setTimeout(r, ms));

    async function launch() {
      const proj = document.getElementById("proj").value.trim();
      if (!proj || running) return;
      running = true; allArtifacts = []; artDone = 0;

      const btn = document.getElementById("launchBtn");
      btn.disabled = true; btn.textContent = "Running…";
      document.getElementById("resetBtn").style.display = "none";
      document.querySelectorAll(".echip").forEach(c => c.disabled = true);
      document.getElementById("arts-count").textContent = `0 / ${artTotal} files`;
      document.getElementById("pf").style.width = "0%";

      // Clear state
      AGENTS.forEach(ag => { setStatus(ag.id, "idle"); document.getElementById(`tb-${ag.id}`).classList.remove("show"); });
      document.getElementById("feed").querySelectorAll(".msg,.typing").forEach(el => el.remove());
      document.getElementById("fempty").style.display = "flex";
      document.getElementById("arts-inner").innerHTML = "";
      document.getElementById("arts-footer").style.display = "none";
      document.getElementById("prog-wrap").style.display = "none";
      document.getElementById("main").classList.remove("show-arts");

      try {
        // ── Phase 1: Team Lead Plans ──
        setStatus("lead", "thinking"); showTyping("Marcus Chen");

        const leadSys = `You are Marcus Chen, CTO of a startup. Team:
- Emma Walsh (id: pm) — Product Manager
- Sarah Kim (id: backend) — Backend Engineer
- Alex Rivera (id: frontend) — Frontend Engineer
- Priya Patel (id: ai) — AI/ML Engineer
- Jordan Lee (id: devops) — DevOps Engineer

Respond ONLY with valid JSON (no markdown fences, no extra text):
{"announcement":"Energetic 2-3 sentence kickoff, specific to the project and tech","tasks":[{"assignee":"pm|backend|frontend|ai|devops","title":"Concise task title","description":"2 sentences: what to build and the key technical decision","priority":"high|medium|low"}]}
One task per member, all 5 included.`;

        const lead = await ollamaJSON(leadSys, `Project: ${proj}`);
        removeTyping(); setStatus("lead", "active");
        addMsg("lead", "all", lead.announcement, "kickoff");

        const taskMap = {};
        for (const t of (lead.tasks || [])) { taskMap[t.assignee] = t; setTask(t.assignee, t); setStatus(t.assignee, "assigned"); }
        await delay(500);

        // ── Phase 2: Status Updates ──
        const order = ["pm", "backend", "frontend", "ai", "devops"];
        const responses = {};

        for (const mid of order) {
          const task = taskMap[mid]; if (!task) continue;
          const ag = byId[mid]; setStatus(mid, "thinking"); showTyping(ag.name); await delay(500);

          const mSys = `You are ${ag.name}, ${ag.role} at a startup. Project: "${proj}"
Your task: "${task.title}" — ${task.description}
Respond ONLY with JSON (no fences):
{"statusUpdate":"2-3 confident sentences: acknowledge the task, state specific technical approach, name one concrete first action","collaborations":[{"toAgent":"pm|backend|frontend|ai|devops","message":"Specific cross-team dependency or API contract question"}]}
At most 2 collaborations, only real dependencies.`;

          const mr = await ollamaJSON(mSys, `Task: ${task.title} — ${task.description}`);
          responses[mid] = mr.statusUpdate; removeTyping(); setStatus(mid, "active");
          addMsg(mid, "lead", mr.statusUpdate, "update"); await delay(300);
          for (const c of (mr.collaborations || [])) {
            if (byId[c.toAgent] && c.toAgent !== mid) { await delay(200); addMsg(mid, c.toAgent, c.message, "collab"); }
          }
        }

        // ── Phase 3: Generate Artifacts ──
        await delay(500);

        for (const mid of order) {
          const task = taskMap[mid]; if (!task) continue;
          const specs = ART[mid] || []; if (!specs.length) continue;

          for (const spec of specs) {
            const loadId = addLoadingCard(mid, spec.filename);
            addMsg(mid, "lead", `Generating ${spec.filename}…`, "artifact");
            await delay(150);
            try {
              const content = await ollamaText(spec.system(proj, task.description),
                `Project: ${proj}\nMy task: ${task.title} — ${task.description}`);
              replaceWithArtifact(loadId, mid, spec.filename, spec.desc, content);
            } catch (e) {
              replaceWithArtifact(loadId, mid, spec.filename, spec.desc,
                `# Generation failed\n# Error: ${e.message}\n# Retry by re-running with a smaller model or increasing context.`);
            }
            await delay(300);
          }
          setStatus(mid, "done");
        }

        // ── Phase 4: Team Lead Summary + Sprint Plan ──
        await delay(600); setStatus("lead", "thinking"); showTyping("Marcus Chen");
        const teamSum = order.filter(id => responses[id]).map(id => `${byId[id].name}: ${responses[id]}`).join("\n");

        const sumSys = `You are Marcus Chen, CTO. Respond ONLY with JSON:
{"summary":"2 sentences: praise the team's technical plans and name the single most important first milestone this week."}`;
        const sum = await ollamaJSON(sumSys, `Project: ${proj}\nTeam updates:\n${teamSum}`);
        removeTyping();
        addMsg("lead", "all", sum.summary, "wrapup");

        // Sprint plan artifact
        const sprintSpec = ART.lead[0];
        const loadId = addLoadingCard("lead", sprintSpec.filename);
        addMsg("lead", "all", "Generating sprint-plan.md…", "artifact");
        try {
          const content = await ollamaText(sprintSpec.system(proj, teamSum), `Project: ${proj}`);
          replaceWithArtifact(loadId, "lead", sprintSpec.filename, sprintSpec.desc, content);
        } catch (e) {
          replaceWithArtifact(loadId, "lead", sprintSpec.filename, sprintSpec.desc, `# Error: ${e.message}`);
        }
        setStatus("lead", "done");
        document.getElementById("prog-wrap").style.display = "none";
        document.getElementById("arts-count").textContent = `${allArtifacts.length} files ready`;

      } catch (e) {
        console.error(e); removeTyping();
        addMsg("lead", "all", `Fatal error: ${e.message}. Check Ollama host and model.`, "error");
        document.getElementById("prog-wrap").style.display = "none";
      }

      running = false; btn.disabled = false; btn.textContent = "Launch ↗";
      document.getElementById("resetBtn").style.display = "block";
    }

    function resetAll() {

    async function checkOllama() {

    async function fetchModels() {
      try {
        const r = await fetch(`${getHost()}/api/tags`);
        const d = await r.json(); const sel = document.getElementById("modelSel");
        sel.innerHTML = ""; (d.models || []).forEach(m => {
          const o = document.createElement("option"); o.value = m.name; o.textContent = m.name;
          if (m.name === getModel()) o.selected = true; sel.appendChild(o);

        sel.style.display = "block";
      } catch { alert("Could not fetch models. Check Ollama host."); }
    }

    document.getElementById("proj").addEventListener("keydown", e => { if (e.key === "Enter" && !running) launch(); });
    window.addEventListener("load", () => setTimeout(checkOllama, 700));
  </script>
</body>

</html>
